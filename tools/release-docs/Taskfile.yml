version: '3'

vars:
  REPO_ROOT: '{{.REPO_ROOT | default "../.."}}'
  ALIASES_FILE: '{{.ALIASES_FILE | default "data/aliases.yml"}}'

tasks:
  setup:
    desc: Install PHP dependencies
    cmds:
      - composer install --no-interaction --no-progress
    sources:
      - composer.json
      - composer.lock
    generates:
      - vendor/autoload.php

  lint:
    desc: Run all static checks (phpcs + phpstan)
    deps: [setup]
    cmds:
      - composer phpcs
      - composer phpstan

  test:
    desc: Run PHPUnit tests
    deps: [setup]
    cmds:
      - composer test

  check:
    desc: Lint + test (full check suite)
    deps: [setup]
    cmds:
      - composer check

  gen-acknowledgements:
    desc: Render the per-release acknowledgements page
    deps: [setup]
    requires:
      vars: [REPO_PATH, PREV_VERSION, VERSION]
    vars:
      OUTPUT: '{{.OUTPUT | default (printf "%s/content/acknowledgements/%s.md" .REPO_ROOT .VERSION)}}'
    cmds:
      - mkdir -p "$(dirname '{{.OUTPUT}}')"
      - >-
        php bin/gen-acknowledgements.php
        --repo-path={{.REPO_PATH}}
        --prev-version={{.PREV_VERSION}}
        --release-version={{.VERSION}}
        --output={{.OUTPUT}}

  gen-ehi:
    desc: Regenerate the EHI (b)(10) SchemaSpy documentation for a release
    deps: [setup]
    requires:
      vars: [OPENEMR_CHECKOUT, VERSION]
    vars:
      OUTPUT: '{{.OUTPUT | default (printf "%s/static/documentation/%s/b10/" .REPO_ROOT .VERSION)}}'
      DB_HOST: '{{.DB_HOST | default "127.0.0.1"}}'
      DB_PORT: '{{.DB_PORT | default "3306"}}'
      DB_NAME: '{{.DB_NAME | default "openemr"}}'
      DB_USER: '{{.DB_USER | default "openemr"}}'
      DB_PASSWORD: '{{.DB_PASSWORD | default "openemr"}}'
      DB_SCHEMA: '{{.DB_SCHEMA | default "openemr"}}'
    cmds:
      - mkdir -p '{{.OUTPUT}}'
      - >-
        php bin/gen-ehi.php
        --openemr-checkout={{.OPENEMR_CHECKOUT}}
        --release-version={{.VERSION}}
        --output={{.OUTPUT}}
        --db-host={{.DB_HOST}}
        --db-port={{.DB_PORT}}
        --db-name={{.DB_NAME}}
        --db-user={{.DB_USER}}
        --db-password={{.DB_PASSWORD}}
        --db-schema={{.DB_SCHEMA}}

  apply-aliases:
    desc: Merge wiki-URL aliases into Hugo page frontmatter
    deps: [setup]
    cmds:
      - >-
        php bin/gen-aliases.php
        --mapping={{.REPO_ROOT}}/{{.ALIASES_FILE}}
        --content-root={{.REPO_ROOT}}/content

  validate-dispatch:
    desc: Validate a dispatch payload against contracts/dispatch.schema.json
    deps: [setup]
    requires:
      vars: [PAYLOAD]
    cmds:
      - php bin/validate-dispatch.php --payload={{.PAYLOAD}}

  resolve-released-at:
    desc: |
      Pick the first non-empty released_at candidate from four sources.
      The workflow gathers each source via inline gh/jq calls; this task
      just picks the winner. Emits `released_at=<date>` on stdout (or
      nothing if all sources are empty).
    deps: [setup]
    cmds:
      - >-
        php bin/resolve-released-at.php
        {{if .INPUT_RELEASED_AT}}--input-released-at={{shellQuote .INPUT_RELEASED_AT}}{{end}}
        {{if .RELEASE_PUBLISHED_AT}}--release-published-at={{shellQuote .RELEASE_PUBLISHED_AT}}{{end}}
        {{if .TAGGER_DATE}}--tagger-date={{shellQuote .TAGGER_DATE}}{{end}}
        {{if .DISPATCHED_AT}}--dispatched-at={{shellQuote .DISPATCHED_AT}}{{end}}

  update-manifest:
    desc: Apply a dispatch payload to a releases.json (defaults to the in-repo copy)
    deps: [setup]
    requires:
      vars: [PAYLOAD]
    vars:
      MANIFEST: '{{.MANIFEST | default (printf "%s/data/releases.json" .REPO_ROOT)}}'
    cmds:
      # RELEASED_AT is optional; when set (openemr-tag path, resolved by
      # the workflow's Resolve released_at step) it pins the manifest's
      # released_at to the tag date. When unset, update-manifest.php's
      # gmdate('Y-m-d') fallback wins -- correct only when the dispatch
      # happens to fire on the same UTC day as the tag was published.
      - >-
        php bin/update-manifest.php
        --payload={{.PAYLOAD}}
        --manifest={{.MANIFEST}}
        --schema={{.REPO_ROOT}}/data/releases.schema.json
        {{if .RELEASED_AT}}--released-at={{shellQuote .RELEASED_AT}}{{end}}

  derive-announcement-inputs:
    desc: Emit version/tag/branch/forum_url lines for the announcements workflow
    deps: [setup]
    cmds:
      - >-
        php bin/derive-announcement-inputs.php
        {{if .HEAD_REF}}--head-ref={{shellQuote .HEAD_REF}}{{end}}
        {{if .VERSION}}--release-version={{shellQuote .VERSION}}{{end}}
        {{if .TAG}}--release-tag={{shellQuote .TAG}}{{end}}
        {{if .BRANCH}}--release-branch={{shellQuote .BRANCH}}{{end}}
        {{if .FORUM_URL}}--forum-url={{shellQuote .FORUM_URL}}{{end}}

  render-announcements:
    desc: Render per-channel release-announcement drafts to a directory
    requires:
      vars: [OUTPUT_DIR, VERSION, TAG, BRANCH]
    deps: [setup]
    cmds:
      - >-
        php bin/render-announcements.php
        --output-dir={{shellQuote .OUTPUT_DIR}}
        --release-version={{shellQuote .VERSION}}
        --release-tag={{shellQuote .TAG}}
        --release-branch={{shellQuote .BRANCH}}
        {{if .FORUM_URL}}--forum-url={{shellQuote .FORUM_URL}}{{end}}

  render-announcement-step-summary:
    desc: Render the GitHub Actions step-summary markdown for the announcement drafts
    requires:
      vars: [OUTPUT_DIR, VERSION, TAG]
    deps: [setup]
    cmds:
      - >-
        php bin/render-announcement-step-summary.php
        --output-dir={{shellQuote .OUTPUT_DIR}}
        --release-version={{shellQuote .VERSION}}
        --release-tag={{shellQuote .TAG}}
        {{if .FORUM_URL}}--forum-url={{shellQuote .FORUM_URL}}{{end}}
        {{if .OUTPUT}}--output={{shellQuote .OUTPUT}}{{end}}

  lint-aliases:
    desc: Verify every aliases mapping target points to an existing Hugo page
    deps: [setup]
    cmds:
      - >-
        php bin/gen-aliases.php
        --check
        --mapping={{.REPO_ROOT}}/{{.ALIASES_FILE}}
        --content-root={{.REPO_ROOT}}/content

  hugo-build:
    desc: Build the Hugo site from REPO_ROOT (CI verifies generators produce buildable content)
    dir: '{{.REPO_ROOT}}'
    cmds:
      - hugo --minify

  # ---------------------------------------------------------------------
  # `workflow:*` tasks are called from .github/workflows/release-docs.yml.
  # Each one is the body of one workflow step — kept here so the workflow
  # YAML stays a thin sequencer instead of a shell script.
  # All env vars below come from the workflow step's `env:` block.
  # ---------------------------------------------------------------------

  workflow:resolve-payload:
    desc: |
      Normalize a dispatch envelope from either repository_dispatch or
      workflow_dispatch into $RUNNER_TEMP/payload.json and project the
      keys downstream steps consume onto $GITHUB_OUTPUT.
    cmds:
      - |
        payload="$RUNNER_TEMP/payload.json"
        if [[ "$EVENT_NAME" == 'repository_dispatch' ]]; then
          printf '%s' "$CLIENT_PAYLOAD" > "$payload"
        else
          jq \
            --arg actor "$GITHUB_ACTOR" \
            --arg repo  'openemr/openemr' \
            --arg ts    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f contracts/inputs-to-envelope.jq \
            <<< "$INPUTS_PAYLOAD" > "$payload"
        fi
        {
          printf 'file=%s\n' "$payload"
          jq -r -f contracts/payload-outputs.jq "$payload"
        } >> "$GITHUB_OUTPUT"

  workflow:prepare-publish:
    desc: |
      Clone the website-openemr repo into $PUBLISH and check out $BRANCH.
      Falls back to a fresh branch off master when $BRANCH does not exist
      remotely yet (first dispatch for a version). The clone uses the App
      token in the URL — no actions/checkout extraheader interferes.
    cmds:
      - |
        # $STAGING is created here so commit-push can rsync from it
        # unconditionally; an empty dir is a harmless no-op for rsync.
        mkdir -p "$STAGING"
        rm -rf "$PUBLISH"
        git clone --quiet --depth 1 \
          "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
          "$PUBLISH"
        git -C "$PUBLISH" config user.name 'openemr-release-bot[bot]'
        git -C "$PUBLISH" config user.email 'openemr-release-bot[bot]@users.noreply.github.com'
        # Enable LFS clean filters locally so committing the b10 docs tree
        # captures it as LFS objects (per the repo-root .gitattributes rule).
        git -C "$PUBLISH" lfs install --local
        # Every dispatch rebases the branch on master's current HEAD.
        # The docs branch is a working PR whose only real content is
        # what update-manifest.php and the generators add on top of
        # master — the per-version data/releases.json entry, and the
        # per-version content/ files. Committing on top of the previous
        # branch state (the pre-fix pattern) let the branch's history
        # diverge from master indefinitely. Even after #174 fixed the
        # file-content drift by resetting data/releases.json from
        # master, git's 3-way merge with master still saw two divergent
        # histories both editing the same lines with the same intent
        # and flagged spurious conflicts.
        #
        # Fix: always create $BRANCH fresh on master's HEAD, replacing
        # its pre-existing state (if any) via force-push in
        # workflow:commit-push. Each dispatch produces a single-commit
        # branch whose merge base with master is master's current tip;
        # the PR always merges cleanly with just the version entry +
        # generated content as the diff. The `--depth 1` clone above
        # already fetched master, so `origin/HEAD` resolves without an
        # extra fetch.
        #
        # We still fetch the remote $BRANCH ref (if it exists) into
        # refs/remotes/origin/$BRANCH so workflow:commit-push has a
        # baseline for --force-with-lease. Without that ref, commit-push
        # falls to a plain `git push` which the server rejects because
        # HEAD isn't a fast-forward of the remote branch's current tip
        # (the whole point is that we're rewriting, not extending).
        #
        # Only the "remote ref doesn't exist" case is expected here
        # (first dispatch on a new version). Every other fetch failure —
        # network, auth, permissions — should surface in CI, not be
        # silently swallowed: absorbing them would leave the ref
        # unpopulated and reproduce the exact plain-push-reject bug this
        # step is meant to prevent.
        fetch_log=$(mktemp)
        if ! git -C "$PUBLISH" fetch --quiet --depth 1 origin \
            "+refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}" 2>"$fetch_log"; then
          if ! grep -q "couldn't find remote ref" "$fetch_log"; then
            cat "$fetch_log" >&2
            rm -f "$fetch_log"
            exit 1
          fi
        fi
        rm -f "$fetch_log"
        git -C "$PUBLISH" checkout -B "$BRANCH" origin/HEAD

  workflow:commit-push:
    desc: |
      Apply $STAGING on top of $PUBLISH, commit, and force-push to $BRANCH.
      Reports `pushed=true|false` on $GITHUB_OUTPUT. The $PUBLISH clone
      already has the App token wired into its origin remote by
      workflow:prepare-publish.
    cmds:
      - |
        # Generators write under $STAGING. update-manifest writes directly
        # into $PUBLISH/data/releases.json (it needs the live manifest to
        # mutate). prepare-publish guarantees $STAGING exists, so rsync
        # is unconditional — an empty staging dir is a no-op.
        rsync -a "${STAGING}/" "${PUBLISH}/"
        git -C "$PUBLISH" add -A
        if git -C "$PUBLISH" diff --cached --quiet; then
          echo 'no docs changes; skipping push'
          echo 'pushed=false' >> "$GITHUB_OUTPUT"
          exit 0
        fi
        git -C "$PUBLISH" commit -m "release-docs: ${EVENT} ${VERSION} @ ${SHA:0:12}"
        # --force-with-lease needs an explicit expected baseline. The
        # local branch isn't tracking origin/$BRANCH (prepare-publish
        # does `checkout -B`, not `--track`), so a bare --force-with-lease
        # has no @{upstream} to read and the server rejects with
        # "stale info". When the remote-tracking ref doesn't exist (first
        # dispatch for this version), fall back to a plain push that
        # creates the branch.
        if base=$(git -C "$PUBLISH" rev-parse --verify --quiet "refs/remotes/origin/${BRANCH}"); then
          git -C "$PUBLISH" push \
            --force-with-lease="refs/heads/${BRANCH}:${base}" \
            origin "HEAD:${BRANCH}"
        else
          git -C "$PUBLISH" push origin "HEAD:${BRANCH}"
        fi
        echo 'pushed=true' >> "$GITHUB_OUTPUT"

  workflow:upsert-pr:
    desc: |
      Create or update the long-lived draft PR for release-docs/$VERSION.
      Idempotent: same arguments produce the same title/body.
    cmds:
      - |
        short_sha="${SHA:0:12}"
        # openemr-tag is the post-tag "final content" dispatch — the workflow
        # flips the PR out of draft in a follow-up step, so the title tracks
        # that state. rel-cut/rel-update remain "(DRAFT)" while the PR
        # accumulates pre-tag content.
        if [ "$EVENT" = 'openemr-tag' ]; then
          title="release-docs: OpenEMR ${VERSION}"
        else
          title="release-docs: OpenEMR ${VERSION} (DRAFT)"
        fi
        body_file="$RUNNER_TEMP/pr-body.md"
        # shellcheck disable=SC2016
        {
          printf 'Auto-generated documentation for OpenEMR %s.\n\n' "$VERSION"
          printf -- '- Event: `%s`\n' "$EVENT"
          printf -- '- openemr/openemr sha: `%s`\n' "$short_sha"
          printf -- '- Run: https://github.com/%s/actions/runs/%s\n\n' \
            "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
          printf 'This PR is force-updated on every dispatch. Do not push commits\n'
          printf 'directly — they will be overwritten.\n'
        } > "$body_file"
        # Filter by --state open so a previously-merged PR for the same
        # branch (typical after a recovery dispatch on a release-docs
        # branch whose original PR already shipped) doesn't get matched
        # here and silently absorbed by `gh pr edit` -- editing a merged
        # PR is a no-op for the intent, leaves the freshly force-pushed
        # branch unattached to any live PR, and reports success while
        # doing nothing. Capture the PR number explicitly so `gh pr edit`
        # can't ambiguously fall back to a closed/merged match if the
        # `--head`/`--state` combination ever returns multiple.
        open_pr="$(gh pr list --repo "$GITHUB_REPOSITORY" \
          --head "$BRANCH" --state open --json number \
          --jq '.[0].number // empty')"
        if [ -n "$open_pr" ]; then
          gh pr edit "$open_pr" --repo "$GITHUB_REPOSITORY" \
            --title "$title" --body-file "$body_file"
        else
          gh pr create --draft --repo "$GITHUB_REPOSITORY" \
            --base master --head "$BRANCH" \
            --title "$title" --body-file "$body_file"
        fi

  workflow:sub-dispatch:
    desc: |
      Forward an inbound docs-binaries payload as a cross-repo
      repository_dispatch to openemr/website-openemr-files. The envelope
      is rebuilt locally via contracts/sub-dispatch.jq so the downstream
      consumer validates against the same vendored schema.
    cmds:
      - |
        sub="$RUNNER_TEMP/sub-dispatch.json"
        jq --arg sha     "$GITHUB_SHA" \
           --arg actor   "$GITHUB_ACTOR" \
           --arg repo    "$GITHUB_REPOSITORY" \
           --arg ts      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
           --arg version "$VERSION" \
           --arg branch  "$BRANCH_NAME" \
           -f contracts/sub-dispatch.jq \
           "$PAYLOAD" > "$sub"
        gh api -X POST /repos/openemr/website-openemr-files/dispatches \
          --input "$sub"

  workflow:gen-ehi:
    desc: |
      Load the fresh-install schema into the MariaDB service and regenerate
      the EHI (b)(10) SchemaSpy docs into
      $STAGING/static/documentation/$VERSION/b10/. Table set + schemaspy
      assets come from $OPENEMR_CHECKOUT; when $FALLBACK is 'true' (tagged sha
      predates b10-tables.yml — the retroactive 8.1.0 path) they come from the
      openemr-master checkout at $GITHUB_WORKSPACE/.openemr-ehi-fallback while
      the schema is still loaded from the tagged sha's sql/database.sql.
    cmds:
      - |
        db_host="${DB_HOST:-127.0.0.1}"
        db_port="${DB_PORT:-3306}"
        db_name="${DB_NAME:-openemr}"
        db_user="${DB_USER:-openemr}"
        db_password="${DB_PASSWORD:-openemr}"
        mysql -h"$db_host" -P"$db_port" -u"$db_user" -p"$db_password" "$db_name" \
          < "$OPENEMR_CHECKOUT/sql/database.sql"
        ehi_src="$OPENEMR_CHECKOUT/Documentation/EHI_Export"
        if [ "${FALLBACK:-false}" = 'true' ]; then
          ehi_src="$GITHUB_WORKSPACE/.openemr-ehi-fallback/Documentation/EHI_Export"
        fi
        php bin/gen-ehi.php \
          --openemr-checkout="$OPENEMR_CHECKOUT" \
          --release-version="$VERSION" \
          --output="$STAGING/static/documentation/$VERSION/b10/" \
          --tables-file="$ehi_src/b10-tables.yml" \
          --schemaspy-dir="$ehi_src/schemaspy" \
          --db-host="$db_host" \
          --db-port="$db_port" \
          --db-name="$db_name" \
          --db-user="$db_user" \
          --db-password="$db_password"

  workflow:strip-sidecar:
    desc: |
      Strip the `_files` sidecar from $PAYLOAD and write the canonical
      envelope to $RUNNER_TEMP/payload.canonical.json. Used by the
      validate-dispatch and update-manifest steps.
    cmds:
      - jq 'del(._files)' "$PAYLOAD" > "$RUNNER_TEMP/payload.canonical.json"
