version: '3'

vars:
  REPO_ROOT: '{{.REPO_ROOT | default "../.."}}'
  ALIASES_FILE: '{{.ALIASES_FILE | default "data/aliases.yml"}}'

tasks:
  setup:
    desc: Install PHP dependencies
    cmds:
      - composer install --no-interaction --no-progress
    sources:
      - composer.json
      - composer.lock
    generates:
      - vendor/autoload.php

  lint:
    desc: Run all static checks (phpcs + phpstan)
    deps: [setup]
    cmds:
      - composer phpcs
      - composer phpstan

  test:
    desc: Run PHPUnit tests
    deps: [setup]
    cmds:
      - composer test

  check:
    desc: Lint + test (full check suite)
    deps: [setup]
    cmds:
      - composer check

  gen-acknowledgements:
    desc: Render the per-release acknowledgements page
    deps: [setup]
    requires:
      vars: [REPO_PATH, PREV_VERSION, VERSION]
    vars:
      OUTPUT: '{{.OUTPUT | default (printf "%s/content/acknowledgements/%s.md" .REPO_ROOT .VERSION)}}'
    cmds:
      - >-
        php bin/gen-acknowledgements.php
        --repo-path={{.REPO_PATH}}
        --prev-version={{.PREV_VERSION}}
        --release-version={{.VERSION}}
        --output={{.OUTPUT}}

  gen-release-notes:
    desc: Render the per-release release-notes page
    deps: [setup]
    requires:
      vars: [REPO_PATH, PREV_VERSION, VERSION]
    vars:
      OWNER: '{{.OWNER | default "openemr"}}'
      REPO: '{{.REPO | default "openemr"}}'
      OUTPUT: '{{.OUTPUT | default (printf "%s/content/release-notes/%s.md" .REPO_ROOT .VERSION)}}'
    cmds:
      - >-
        php bin/gen-release-notes.php
        --owner={{.OWNER}}
        --repo={{.REPO}}
        --repo-path={{.REPO_PATH}}
        --prev-version={{.PREV_VERSION}}
        --release-version={{.VERSION}}
        --output={{.OUTPUT}}

  gen-install-page:
    desc: Render the per-release install page
    deps: [setup]
    requires:
      vars: [VERSION]
    vars:
      OUTPUT: '{{.OUTPUT | default (printf "%s/content/installation/%s.md" .REPO_ROOT .VERSION)}}'
    cmds:
      - >-
        php bin/gen-install-pages.php
        --mode=install
        --release-version={{.VERSION}}
        --output={{.OUTPUT}}

  gen-upgrade-page:
    desc: Render the per-release upgrade page
    deps: [setup]
    requires:
      vars: [VERSION, PREVIOUS_VERSION]
    vars:
      OUTPUT: '{{.OUTPUT | default (printf "%s/content/upgrade/%s.md" .REPO_ROOT .VERSION)}}'
    cmds:
      - >-
        php bin/gen-install-pages.php
        --mode=upgrade
        --release-version={{.VERSION}}
        --previous-version={{.PREVIOUS_VERSION}}
        --output={{.OUTPUT}}

  apply-aliases:
    desc: Merge wiki-URL aliases into Hugo page frontmatter
    deps: [setup]
    cmds:
      - >-
        php bin/gen-aliases.php
        --mapping={{.REPO_ROOT}}/{{.ALIASES_FILE}}
        --content-root={{.REPO_ROOT}}/content

  validate-dispatch:
    desc: Validate a dispatch payload against contracts/dispatch.schema.json
    deps: [setup]
    requires:
      vars: [PAYLOAD]
    cmds:
      - php bin/validate-dispatch.php --payload={{.PAYLOAD}}

  update-manifest:
    desc: Apply a dispatch payload to data/releases.json
    deps: [setup]
    requires:
      vars: [PAYLOAD]
    cmds:
      - >-
        php bin/update-manifest.php
        --payload={{.PAYLOAD}}
        --manifest={{.REPO_ROOT}}/data/releases.json
        --schema={{.REPO_ROOT}}/data/releases.schema.json

  lint-aliases:
    desc: Verify every aliases mapping target points to an existing Hugo page
    deps: [setup]
    cmds:
      - >-
        php bin/gen-aliases.php
        --check
        --mapping={{.REPO_ROOT}}/{{.ALIASES_FILE}}
        --content-root={{.REPO_ROOT}}/content

  hugo-build:
    desc: Build the Hugo site from REPO_ROOT (CI verifies generators produce buildable content)
    dir: '{{.REPO_ROOT}}'
    cmds:
      - hugo --minify

  # ---------------------------------------------------------------------
  # `workflow:*` tasks are called from .github/workflows/release-docs.yml.
  # Each one is the body of one workflow step — kept here so the workflow
  # YAML stays a thin sequencer instead of a shell script.
  # All env vars below come from the workflow step's `env:` block.
  # ---------------------------------------------------------------------

  workflow:resolve-payload:
    desc: |
      Normalize a dispatch envelope from either repository_dispatch or
      workflow_dispatch into $RUNNER_TEMP/payload.json and project the
      keys downstream steps consume onto $GITHUB_OUTPUT.
    cmds:
      - |
        payload="$RUNNER_TEMP/payload.json"
        if [[ "$EVENT_NAME" == 'repository_dispatch' ]]; then
          printf '%s' "$CLIENT_PAYLOAD" > "$payload"
        else
          jq \
            --arg actor "$GITHUB_ACTOR" \
            --arg repo  'openemr/openemr' \
            --arg ts    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f contracts/inputs-to-envelope.jq \
            <<< "$INPUTS_PAYLOAD" > "$payload"
        fi
        {
          printf 'file=%s\n' "$payload"
          jq -r -f contracts/payload-outputs.jq "$payload"
        } >> "$GITHUB_OUTPUT"

  workflow:commit-push:
    desc: |
      Commit anything new in the working tree and force-push it to
      release-docs/$VERSION. Reports `pushed=true|false` on $GITHUB_OUTPUT.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - |
        git config user.name 'openemr-release-bot[bot]'
        git config user.email 'openemr-release-bot[bot]@users.noreply.github.com'
        git remote set-url origin \
          "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        # The first dispatch for a version creates release-docs/$VERSION;
        # later dispatches in the same release (rel-update, openemr-tag)
        # check out master and have no local ref for the branch. We need
        # to (a) build on top of any prior dispatch's artifacts so this
        # commit doesn't clobber them, and (b) give --force-with-lease a
        # current baseline so it doesn't reject with "stale info".
        # Both come from fetching the branch and basing our work on it.
        if git fetch origin "+refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}" 2>/dev/null; then
          git checkout -B "$BRANCH" "origin/${BRANCH}"
        else
          # First dispatch for this version — branch doesn't exist yet.
          git checkout -B "$BRANCH"
        fi
        git add -A
        if git diff --cached --quiet; then
          echo 'no docs changes; skipping push'
          echo 'pushed=false' >> "$GITHUB_OUTPUT"
          exit 0
        fi
        git commit -m "release-docs: ${EVENT} ${VERSION} @ ${SHA:0:12}"
        git push --force-with-lease origin "HEAD:${BRANCH}"
        echo 'pushed=true' >> "$GITHUB_OUTPUT"

  workflow:upsert-pr:
    desc: |
      Create or update the long-lived draft PR for release-docs/$VERSION.
      Idempotent: same arguments produce the same title/body.
    cmds:
      - |
        short_sha="${SHA:0:12}"
        title="release-docs: OpenEMR ${VERSION} (DRAFT)"
        body_file="$RUNNER_TEMP/pr-body.md"
        # shellcheck disable=SC2016
        {
          printf 'Auto-generated documentation for OpenEMR %s.\n\n' "$VERSION"
          printf -- '- Event: `%s`\n' "$EVENT"
          printf -- '- openemr/openemr sha: `%s`\n' "$short_sha"
          printf -- '- Run: https://github.com/%s/actions/runs/%s\n\n' \
            "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
          printf 'This PR is force-updated on every dispatch. Do not push commits\n'
          printf 'directly — they will be overwritten.\n'
        } > "$body_file"
        if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json number >/dev/null 2>&1; then
          gh pr edit "$BRANCH" --repo "$GITHUB_REPOSITORY" \
            --title "$title" --body-file "$body_file"
        else
          gh pr create --draft --repo "$GITHUB_REPOSITORY" \
            --base master --head "$BRANCH" \
            --title "$title" --body-file "$body_file"
        fi

  workflow:sub-dispatch:
    desc: |
      Forward an inbound docs-binaries payload as a cross-repo
      repository_dispatch to openemr/website-openemr-files. The envelope
      is rebuilt locally via contracts/sub-dispatch.jq so the downstream
      consumer validates against the same vendored schema.
    cmds:
      - |
        sub="$RUNNER_TEMP/sub-dispatch.json"
        jq --arg sha     "$GITHUB_SHA" \
           --arg actor   "$GITHUB_ACTOR" \
           --arg repo    "$GITHUB_REPOSITORY" \
           --arg ts      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
           --arg version "$VERSION" \
           --arg branch  "$BRANCH_NAME" \
           -f contracts/sub-dispatch.jq \
           "$PAYLOAD" > "$sub"
        gh api -X POST /repos/openemr/website-openemr-files/dispatches \
          --input "$sub"

  workflow:strip-sidecar:
    desc: |
      Strip the `_files` sidecar from $PAYLOAD and write the canonical
      envelope to $RUNNER_TEMP/payload.canonical.json. Used by the
      validate-dispatch and update-manifest steps.
    cmds:
      - jq 'del(._files)' "$PAYLOAD" > "$RUNNER_TEMP/payload.canonical.json"
