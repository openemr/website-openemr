# Builds the site and (on master) deploys it to GitHub Pages. The Pages
# site is published both at https://openemr.github.io/website-openemr/
# and at the custom domain https://www.open-emr.org/ (fronted by
# Cloudflare); both are served from the same artifact, so the build
# must use the production baseURL from config.yaml without override.
#
# The build job runs on every PR and master push and gates the deploy
# job behind a Hugo WARN allowlist. Deploy only runs on master push and
# rebuilds the site — the build job's artifact is a fail-fast gate,
# not the deployable artifact.
name: site

on:
  push:
    branches: [master]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'data/**'
      - 'static/**'
      - 'archetypes/**'
      - 'themes/**'
      - 'config.yaml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  pull_request:
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'data/**'
      - 'static/**'
      - 'archetypes/**'
      - 'themes/**'
      - 'config.yaml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

# PR runs auto-cancel on supersede; master pushes and dispatches
# serialize on the ref so a follow-up push waits rather than cancelling
# an in-flight deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  HUGO_VERSION: '0.150.0'
  NODE_VERSION: '24'

jobs:
  build:
    name: hugo build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install theme dependencies
        working-directory: ./themes/openemr
        run: npm ci
      - name: Build site
        shell: bash
        run: hugo --gc --minify 2>&1 | tee "$RUNNER_TEMP/hugo.log"
      - name: Filter WARN lines against allowlist
        run: |
          # Allowlist pre-existing warnings. Update only when removing
          # or replacing a known-permanent warning.
          awk '
            /^WARN/ &&
            index($0, "deprecated: project config key languageCode") == 0 &&
            index($0, "deprecated: .Site.Data was deprecated") == 0 &&
            index($0, "Google Analytics 4 (GA4) replaced") == 0
          ' "$RUNNER_TEMP/hugo.log" > "$RUNNER_TEMP/hugo.unexpected"
      - name: Fail on unexpected warnings
        run: |
          if [[ -s "$RUNNER_TEMP/hugo.unexpected" ]]; then
            cat "$RUNNER_TEMP/hugo.unexpected"
            exit 1
          fi
      - name: Upload Hugo log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hugo-log
          path: ${{ runner.temp }}/hugo.log
          if-no-files-found: warn

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install theme dependencies
        working-directory: ./themes/openemr
        run: npm ci
      - name: Build for deploy
        run: hugo --minify
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      # Best-effort: GitHub Pages serves www.open-emr.org via Cloudflare,
      # which caches aggressively. Purge so the new deploy is visible
      # without waiting for TTL expiry. Never fails the deploy.
      - name: Purge Cloudflare cache
        if: success()
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ZONE_ID" ]]; then
            echo "Cloudflare secrets not set; skipping cache purge."
            exit 0
          fi
          curl --fail --silent --show-error \
            -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
