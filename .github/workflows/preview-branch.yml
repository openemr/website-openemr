# Publishes a preview of any non-master org branch to the previews repo
# so changes are viewable before merge. Each branch lands in its own
# `branch-<slug>/` subfolder under
# https://openemr.github.io/website-openemr-previews/.
#
# Trusted context: this only fires on pushes to branches in this repo
# (forks can't push here), so it may hold the app token and build with
# the real `npm ci` step. Fork PRs are handled separately by
# preview-pr-build.yml / preview-pr-publish.yml.
#
# Production (deploy-pages.yml -> openemr.github.io/website-openemr/ +
# Cloudflare) is never touched.
name: preview-branch

on:
  push:
    branches-ignore: [master]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'data/**'
      - 'static/**'
      - 'archetypes/**'
      - 'themes/**'
      - 'config.yaml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/preview-branch.yml'
  # A branch is often pushed before its PR is opened; that push build
  # finds no PR and skips the comment. Re-comment when the PR appears so
  # the link always lands. The folder already exists from the push build.
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

# Serialize per-branch so two quick pushes don't race on the same
# destination folder; supersede in-flight builds for the same branch.
concurrency:
  group: preview-branch-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.150.0'
  NODE_VERSION: '24'
  PREVIEWS_REPO: openemr/website-openemr-previews
  PREVIEWS_BASE: https://openemr.github.io/website-openemr-previews

jobs:
  preview:
    name: build and publish branch preview
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # branch name -> URL/path-safe slug: every non-alphanumeric run
      # collapses to one '-' (tr -cs squeezes), with edge dashes trimmed.
      # Must match the cleanup workflow exactly so the publish and remove
      # paths agree.
      - name: Compute slug
        id: slug
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          slug="$(printf '%s' "$BRANCH" | tr -cs 'A-Za-z0-9' '-')"
          slug="${slug#-}"
          slug="${slug%-}"
          if [[ -z "$slug" ]]; then
            echo "Branch '$BRANCH' produced an empty slug." >&2
            exit 1
          fi
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
      - name: Install theme dependencies
        working-directory: ./themes/openemr
        run: npm ci
      - name: Build site
        env:
          BASE_URL: ${{ env.PREVIEWS_BASE }}/branch-${{ steps.slug.outputs.slug }}/
        run: hugo --gc --minify --baseURL "$BASE_URL"
      - name: Mint App token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            website-openemr-previews
      - name: Publish to previews repo
        uses: ./.github/actions/previews-commit
        with:
          token: ${{ steps.token.outputs.token }}
          repo: ${{ env.PREVIEWS_REPO }}
          dir: branch-${{ steps.slug.outputs.slug }}
          source: ./public
          message: "preview: branch ${{ github.ref_name }} @ ${{ github.sha }}"
      # The push may land before the PR exists; then there's nothing to
      # comment on and the pull_request trigger picks it up later.
      - name: Find open PR for branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" \
            --state open --json number --jq '.[0].number // empty')"
          echo "number=$number" >> "$GITHUB_OUTPUT"
      - name: Comment preview link
        if: ${{ steps.pr.outputs.number != '' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          number: ${{ steps.pr.outputs.number }}
          header: website-preview
          message: |
            ## Website preview

            Built from this branch: ${{ env.PREVIEWS_BASE }}/branch-${{ steps.slug.outputs.slug }}/

            Updates on each push. Removed when the branch is deleted.

  # When a PR is opened/reopened, the push build's preview folder already
  # exists. Fork PRs are excluded — preview-pr-publish.yml comments those.
  comment:
    name: comment branch preview link
    if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-24.04
    steps:
      # Keep this slug logic identical to the preview job and the cleanup
      # workflow so the publish, comment, and remove paths all agree.
      - name: Compute slug
        id: slug
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          slug="$(printf '%s' "$BRANCH" | tr -cs 'A-Za-z0-9' '-')"
          slug="${slug#-}"
          slug="${slug%-}"
          if [[ -z "$slug" ]]; then
            echo "Branch '$BRANCH' produced an empty slug." >&2
            exit 1
          fi
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
      - name: Comment preview link
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          number: ${{ github.event.pull_request.number }}
          header: website-preview
          message: |
            ## Website preview

            Built from this branch: ${{ env.PREVIEWS_BASE }}/branch-${{ steps.slug.outputs.slug }}/

            Updates on each push. Removed when the branch is deleted.
