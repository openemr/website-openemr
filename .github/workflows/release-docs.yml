name: release-docs

# Long-lived docs PR per OpenEMR release. Fired by the conductor in
# openemr/openemr (or any operator via workflow_dispatch with a
# hand-authored payload). Every run regenerates the full per-release
# Hugo content from a fixed openemr/openemr sha and force-pushes
# `release-docs/<version>` so reviewers see the current state.
#
# Inbound contract:  tools/release-docs/contracts/dispatch.schema.json
# Outbound contract: same schema, openemr-docs-binaries variant,
# emitted to openemr/website-openemr-files when the inbound payload
# carries a non-empty data.files array.
#
# This workflow is intentionally a thin sequencer: every non-trivial
# step is a Taskfile target under tools/release-docs/Taskfile.yml so the
# operations can be invoked locally for debugging the same way CI runs
# them. See the `workflow:*` tasks there.
#
# The workspace checkout is the *build environment* only (Composer deps,
# generator source). Generators write into $STAGING under $RUNNER_TEMP,
# and a separate $PUBLISH clone is the actual force-push target. This
# decoupling keeps the workspace's untracked generated files from
# colliding with the publish branch's tracked content during checkout.

on:
  repository_dispatch:
    types:
      - openemr-rel-cut
      - openemr-rel-update
      - openemr-tag
  workflow_dispatch:
    inputs:
      event:
        description: 'Dispatch event name (openemr-rel-cut | openemr-rel-update | openemr-tag).'
        required: true
        type: choice
        options:
          - openemr-rel-cut
          - openemr-rel-update
          - openemr-tag
      version:
        description: 'Release version, e.g. 8.1.0.'
        required: true
      branch:
        description: 'Release branch, e.g. rel-810.'
        required: true
      sha:
        description: 'openemr/openemr commit sha to checkout.'
        required: true
      prev_release:
        description: 'Previous release version (e.g. 8.0.0). Empty for the very first dispatch on a new minor line.'
        required: false
        default: ''
      tag:
        description: 'Annotated tag name (openemr-tag only), e.g. v8_1_0.'
        required: false
        default: ''
      files:
        description: 'JSON array of binary filenames to forward to website-openemr-files (e.g. ["openemr-8.1.0-ehi.tar.gz"]). Empty array skips the sub-dispatch.'
        required: false
        default: '[]'
      released_at:
        description: 'YYYY-MM-DD override for the manifest `released_at` field (openemr-tag only). Leave empty to auto-derive from the tag''s GitHub Release publishedAt (or the dispatch envelope''s dispatched_at as a fallback). Set explicitly for retroactive dispatches where those auto-sources would be wrong.'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: read

# Serialize per-version so two dispatches for the same release branch
# don't race on the same `release-docs/<version>` ref. Different
# versions can run in parallel. cancel-in-progress: false because
# regenerations are cheap and overlapping cancels would lose state.
concurrency:
  group: release-docs-${{ github.event.client_payload.data.version || inputs.version }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: tools/release-docs

jobs:
  generate:
    name: generate (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04]
    # Schema-only source for the EHI (b)(10) SchemaSpy run. Always declared
    # (services can't be conditional) but only used by the gated EHI steps;
    # on DRAFT dispatches it idles. db/user/pass = openemr to match the
    # installer defaults the schemaspy invocation expects.
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: openemr
          MARIADB_USER: openemr
          MARIADB_PASSWORD: openemr
          MARIADB_ROOT_PASSWORD: openemr
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6
        with:
          # Defense in depth — we no longer push from this checkout, but
          # leaving GITHUB_TOKEN persisted as an http.extraheader would
          # still cause confusion if anything downstream did a git push
          # from $GITHUB_WORKSPACE.
          persist-credentials: false

      # runner.temp isn't available in job-level env, so resolve all
      # working paths here and export them via GITHUB_ENV. STAGING and
      # PUBLISH live under $RUNNER_TEMP so they can't collide with the
      # workspace's tracked content. OPENEMR_CHECKOUT has to stay under
      # $GITHUB_WORKSPACE — actions/checkout refuses paths outside it —
      # so .openemr-src is gitignored to prevent it from being committed.
      - name: Define working paths
        run: |
          {
            printf 'OPENEMR_CHECKOUT=%s\n' "$GITHUB_WORKSPACE/.openemr-src"
            printf 'STAGING=%s\n' "$RUNNER_TEMP/staging"
            printf 'PUBLISH=%s\n' "$RUNNER_TEMP/publish"
          } >> "$GITHUB_ENV"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install task
        uses: arduino/setup-task@v3
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install release-docs dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev

      - name: Mint App token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            website-openemr
            website-openemr-files

      - name: Resolve dispatch payload
        id: payload
        env:
          EVENT_NAME: ${{ github.event_name }}
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          INPUTS_PAYLOAD: ${{ toJSON(inputs) }}
        run: task workflow:resolve-payload

      - name: Validate payload against dispatch.schema.json
        env:
          PAYLOAD: ${{ steps.payload.outputs.file }}
        run: |
          task workflow:strip-sidecar
          task validate-dispatch PAYLOAD="$RUNNER_TEMP/payload.canonical.json"

      # Conductor test-mode runs (openemr/openemr release-prep with test=true)
      # dispatch from `rel-test`. Treating those as production would put
      # fake versions in data/releases.json and open mergeable docs PRs that
      # ship test artifacts. Instead, route test-mode pushes to a parallel
      # `release-docs-test/<version>` branch and skip the manifest write.
      # Only the production-facing side effects are gated off; auth, lease,
      # and cumulative-publish paths are still exercised end-to-end.
      - name: Detect test mode
        id: mode
        env:
          BRANCH_FROM_PAYLOAD: ${{ steps.payload.outputs.branch }}
        run: |
          if [ "$BRANCH_FROM_PAYLOAD" = 'rel-test' ]; then
            echo 'test=true' >> "$GITHUB_OUTPUT"
            echo 'Test-mode dispatch — pushing to release-docs-test/* and skipping manifest write.'
          else
            echo 'test=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Sparse-checkout openemr/openemr at dispatched sha
        uses: actions/checkout@v6
        with:
          repository: openemr/openemr
          ref: ${{ steps.payload.outputs.sha }}
          path: .openemr-src
          fetch-depth: 0
          sparse-checkout: |
            .git
            version.php
            CHANGELOG.md
            sql/database.sql
            Documentation/EHI_Export/b10-tables.yml
            Documentation/EHI_Export/schemaspy

      # EHI (b)(10) regen is a heavyweight Java+DB step; run it only for
      # FINAL tags and manual dispatches. `fallback` flags the retroactive
      # 8.1.0 case whose tagged sha predates b10-tables.yml, so its assets
      # must come from openemr master instead of the tagged checkout.
      - name: Resolve EHI (b)(10) generation
        id: ehi
        env:
          EVENT: ${{ steps.payload.outputs.event }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = 'openemr-tag' ] || [ "$EVENT_NAME" = 'workflow_dispatch' ]; then
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          else
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
            echo 'EHI (b)(10) regen runs only on openemr-tag or workflow_dispatch; skipping.'
          fi
          if [ -f "$OPENEMR_CHECKOUT/Documentation/EHI_Export/b10-tables.yml" ]; then
            echo 'fallback=false' >> "$GITHUB_OUTPUT"
          else
            echo 'fallback=true' >> "$GITHUB_OUTPUT"
            echo 'Tagged sha predates b10-tables.yml; EHI assets will come from openemr master.'
          fi

      - name: Sparse-checkout EHI assets from openemr master (8.1.0 fallback)
        if: ${{ steps.ehi.outputs.enabled == 'true' && steps.ehi.outputs.fallback == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: openemr/openemr
          ref: master
          path: .openemr-ehi-fallback
          sparse-checkout: |
            Documentation/EHI_Export/b10-tables.yml
            Documentation/EHI_Export/schemaspy

      - name: Set up Java for SchemaSpy
        if: ${{ steps.ehi.outputs.enabled == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare staging + publish-target
        env:
          BRANCH: ${{ steps.mode.outputs.test == 'true' && format('release-docs-test/{0}', steps.payload.outputs.version) || format('release-docs/{0}', steps.payload.outputs.version) }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: task workflow:prepare-publish

      - name: Generate acknowledgements
        if: ${{ steps.payload.outputs.prev_release != '' }}
        env:
          PREV: ${{ steps.payload.outputs.prev_release }}
          VERSION: ${{ steps.payload.outputs.version }}
        run: >-
          task gen-acknowledgements
          REPO_PATH="$OPENEMR_CHECKOUT"
          PREV_VERSION="$PREV"
          VERSION="$VERSION"
          OUTPUT="$STAGING/content/acknowledgements/$VERSION.md"

      # Per-release release-notes pages are no longer generated. The
      # release-notes surface consolidated into openemr's CHANGELOG.md
      # (written by ChangelogMutator + CompatibilityMutator at release-
      # prep + release-finalize PR time; see openemr/openemr#12925 +
      # #12928 + openemr-devops#858). The GitHub Release body (populated
      # by devops's build-release.yml via section-extract from openemr's
      # tagged CHANGELOG.md) is the canonical per-release notes surface
      # now; the wiki's OpenEMR_{version}_Release_Notes page links
      # there. Scrub any stale copies from a prior dispatch that predates
      # this policy -- quiet no-op if the files were never generated for
      # this version.
      - name: Remove stale per-release release-notes page
        env:
          VERSION: ${{ steps.payload.outputs.version }}
        run: |
          rm -f "$PUBLISH/content/release-notes/$VERSION.md"

      # Per-release install/upgrade pages are no longer generated; the
      # /downloads/ template now defaults to the wiki's version-agnostic
      # install/upgrade docs (OpenEMR_{Linux,Windows}_{Installation,Upgrade}).
      # Scrub any stale copies from a prior dispatch that predates this
      # policy — quiet no-op if the files were never generated for this
      # branch.
      - name: Remove stale per-release install/upgrade pages
        env:
          VERSION: ${{ steps.payload.outputs.version }}
        run: |
          rm -f "$PUBLISH/content/installation/$VERSION.md" \
                "$PUBLISH/content/upgrade/$VERSION.md"

      - name: Generate EHI (b)(10) schema docs
        if: ${{ steps.ehi.outputs.enabled == 'true' }}
        env:
          VERSION: ${{ steps.payload.outputs.version }}
          FALLBACK: ${{ steps.ehi.outputs.fallback }}
        run: task workflow:gen-ehi

      # Resolve released_at for the manifest write. The manifest surfaces
      # this date directly on /downloads/ and /releases/. Left to
      # update-manifest.php's default it would use gmdate('Y-m-d') --
      # today's date in the runner's UTC, which is wrong for any dispatch
      # that fires on a different day than the tag was published
      # (retroactive dispatches, near-midnight-UTC tag creation, etc.).
      # See openemr/website-openemr#145.
      #
      # Resolution order (openemr-tag events only; other events don't set
      # released_at):
      #   1. inputs.released_at        explicit workflow_dispatch override
      #   2. Release.publishedAt       canonical tag date via GitHub API
      #                                (matches what users see on the
      #                                Releases page)
      #   3. annotated tag tagger.date atomic with tag creation; always
      #                                exists by the time this workflow
      #                                runs since the openemr-tag dispatch
      #                                is emitted AFTER tag creation
      #   4. envelope.dispatched_at    very last resort if all three
      #                                GitHub API calls fail
      #
      # Steps 2 and 3 are usually within seconds of each other. Step 2 is
      # preferred because it matches the user-facing "Released" moment on
      # github.com/openemr/openemr/releases; step 3 fills the narrow window
      # where openemr-tag dispatch fires before build-release-on-tag.yml
      # has created the Release object.
      - name: Resolve released_at
        id: released_at
        if: ${{ steps.mode.outputs.test != 'true' && steps.payload.outputs.event == 'openemr-tag' }}
        env:
          INPUT_RELEASED_AT: ${{ inputs.released_at }}
          TAG: ${{ steps.payload.outputs.tag }}
          PAYLOAD: ${{ steps.payload.outputs.file }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          # Gather each candidate source, then let bin/resolve-released-at.php
          # pick the winner. Extracting the picker to a testable CLI keeps
          # the priority order under test coverage (ResolveReleasedAtCliTest);
          # the inline gh/jq plumbing below stays here since testing external-
          # command calls in isolation requires PATH-stubbing infrastructure
          # the project doesn't have and gets exercised in production usage
          # anyway.
          #
          # gh release view exits non-zero when the Release object doesn't
          # exist yet (openemr-tag dispatch fires simultaneously with the
          # tag, before build-release-on-tag.yml has created the Release
          # object). The `(.publishedAt // "")[0:10]` idiom coerces null
          # to "" before slicing so we don't feed the literal string
          # "null" downstream when the field exists but is null.
          release_published_at=$(gh release view "$TAG" --repo openemr/openemr \
              --json publishedAt --jq '(.publishedAt // "")[0:10]' 2>/dev/null || true)
          # Annotated tag object's tagger.date. The refs/tags/<tag> lookup
          # returns the tag object SHA; git/tags/<sha> returns the tagger
          # metadata. The tag was created before this workflow ran, so this
          # call should always succeed for openemr-tag events. Same
          # `// ""` null-guard as above on both jq extractions.
          tagger_date=''
          tag_sha=$(gh api "repos/openemr/openemr/git/refs/tags/$TAG" \
              --jq '.object.sha // ""' 2>/dev/null || true)
          if [ -n "$tag_sha" ]; then
            tagger_date=$(gh api "repos/openemr/openemr/git/tags/$tag_sha" \
                --jq '(.tagger.date // "")[0:10]' 2>/dev/null || true)
          fi
          # Envelope dispatched_at is a very-last-resort fallback and is
          # WRONG for retroactive workflow_dispatch reruns of this workflow:
          # workflow:resolve-payload synthesizes dispatched_at as `date -u`
          # (today's UTC time), not the original tag date. That's the same
          # class of bug this issue is fixing. Operators doing retroactive
          # re-dispatches for old tags MUST pass -f released_at=YYYY-MM-DD
          # explicitly. This fallback only helps for repository_dispatch
          # flows where dispatched_at is set by the openemr side within
          # seconds of tag creation. In practice this branch essentially
          # never fires because steps 2+3 (both hit GitHub's API with no
          # permissions surface) will succeed for any real tag.
          dispatched_at=$(jq -r '.dispatched_at[0:10] // empty' "$PAYLOAD")

          resolved=$(task resolve-released-at \
              INPUT_RELEASED_AT="$INPUT_RELEASED_AT" \
              RELEASE_PUBLISHED_AT="$release_published_at" \
              TAGGER_DATE="$tagger_date" \
              DISPATCHED_AT="$dispatched_at" | tail -1)
          if [ -z "$resolved" ]; then
            echo "::warning::released_at could not be resolved from inputs, Release object, annotated tag, or dispatched_at; update-manifest.php will fall back to today's date"
            exit 0
          fi
          value="${resolved#released_at=}"
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "Resolved released_at=$value from candidates (input='$INPUT_RELEASED_AT' release='$release_published_at' tagger='$tagger_date' dispatched='$dispatched_at')"

      - name: Update releases manifest
        if: ${{ steps.mode.outputs.test != 'true' }}
        env:
          PAYLOAD: ${{ steps.payload.outputs.file }}
          RELEASED_AT: ${{ steps.released_at.outputs.value }}
        run: |
          task workflow:strip-sidecar
          task update-manifest \
            PAYLOAD="$RUNNER_TEMP/payload.canonical.json" \
            MANIFEST="$PUBLISH/data/releases.json"

      - name: Commit and force-push docs branch
        id: push
        env:
          BRANCH: ${{ steps.mode.outputs.test == 'true' && format('release-docs-test/{0}', steps.payload.outputs.version) || format('release-docs/{0}', steps.payload.outputs.version) }}
          EVENT: ${{ steps.payload.outputs.event }}
          VERSION: ${{ steps.payload.outputs.version }}
          SHA: ${{ steps.payload.outputs.sha }}
        run: task workflow:commit-push

      - name: Open or update draft PR
        if: ${{ steps.push.outputs.pushed == 'true' }}
        env:
          BRANCH: ${{ steps.mode.outputs.test == 'true' && format('release-docs-test/{0}', steps.payload.outputs.version) || format('release-docs/{0}', steps.payload.outputs.version) }}
          EVENT: ${{ steps.payload.outputs.event }}
          VERSION: ${{ steps.payload.outputs.version }}
          SHA: ${{ steps.payload.outputs.sha }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: task workflow:upsert-pr

      # Post-tag flip: on openemr-tag the docs PR content reflects the
      # shipped state, so we flip out of draft. Skipped for test-mode
      # dispatches (branch is release-docs-test/*, PR is ephemeral) and
      # for pre-tag events (rel-cut/rel-update) that only accumulate
      # draft-quality content. ship-release's full-auto poll waits on
      # isDraft==false before merging the docs PR — this step is what
      # unblocks that wait.
      - name: Flip docs PR out of draft (openemr-tag only)
        if: ${{ steps.push.outputs.pushed == 'true' && steps.payload.outputs.event == 'openemr-tag' && steps.mode.outputs.test != 'true' }}
        env:
          BRANCH: release-docs/${{ steps.payload.outputs.version }}
          TAG: ${{ steps.payload.outputs.tag }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          pr_data="$(gh pr list --repo "$REPO" \
            --head "$BRANCH" --state open \
            --json number,isDraft --jq '.[0]')"
          if [ -z "$pr_data" ] || [ "$pr_data" = 'null' ]; then
            echo "::error::docs PR for $BRANCH not found; upsert-pr should have created/updated it"
            exit 1
          fi
          pr_number="$(printf '%s' "$pr_data" | jq -r '.number')"
          is_draft="$(printf '%s' "$pr_data" | jq -r '.isDraft')"
          # gh pr ready fails if the PR is already out of draft (typical on
          # a re-fire of openemr-tag after a first successful flip). Guard
          # with isDraft so re-fires are idempotent.
          if [ "$is_draft" = 'true' ]; then
            gh pr ready "$pr_number" --repo "$REPO"
            gh pr comment "$pr_number" --repo "$REPO" --body \
              "Comment from Claude: post-tag dispatch applied; content reflects the shipped state for tag \`${TAG}\`. PR flipped out of draft and is ready for merge to master."
          else
            echo "PR #${pr_number} is already out of draft; nothing to flip."
          fi

      - name: Sub-dispatch binaries to website-openemr-files
        if: ${{ steps.payload.outputs.files_count != '0' }}
        env:
          PAYLOAD: ${{ steps.payload.outputs.file }}
          VERSION: ${{ steps.payload.outputs.version }}
          BRANCH_NAME: ${{ steps.payload.outputs.branch }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: task workflow:sub-dispatch
