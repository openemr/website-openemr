name: actionlint

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: actionlint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    name: actionlint (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          # `actions/create-github-app-token@v3` supports both `app-id`
          # (numeric App ID) and `client-id` (App Client ID) for auth;
          # actionlint's bundled action schema only knows about `app-id`
          # and reports the working `client-id` usage as a false positive.
          # release-docs.yml uses `client-id` and runs green in practice
          # (workflow runs on every openemr-rel-cut / rel-update / tag
          # dispatch). Suppress the two known-good findings here.
          actionlint_flags: >-
            -ignore 'missing input "app-id".+create-github-app-token'
            -ignore '"client-id" is not defined.+create-github-app-token'
